<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Kunekune Escape マーカー</title>
  <style>
    @page { size: A4; margin: 0; }
    html, body { margin: 0; padding: 0; }
    body { font-family: sans-serif; }
    .page { width: 21cm; min-height: 29.7cm; padding: 2cm 3cm; box-sizing: border-box; }
    .marker { display: block; width: 15cm; height: 15cm; }
    .note { margin: 0 0 0.5cm; font-size: 11pt; }
    @media print {
      .note { font-size: 10pt; }
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="note">A4に100%スケールで印刷してください。プリンターの「用紙に合わせる」は無効にしてください。</p>
    <img class="marker" src="../../app/src/main/assets/marker.png" alt="Kunekune Escape マーカー">
  </main>
</body>
</html>
